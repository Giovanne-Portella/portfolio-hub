<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Portfolio Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(88, 166, 255, 0.06) 0%, transparent 50%),
                  radial-gradient(circle at 70% 70%, rgba(63, 185, 80, 0.04) 0%, transparent 50%),
                  radial-gradient(circle at 50% 20%, rgba(188, 140, 255, 0.04) 0%, transparent 40%);
      animation: bgFloat 20s ease-in-out infinite;
    }

    @keyframes bgFloat {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(2%, -2%); }
      66% { transform: translate(-1%, 1%); }
    }

    .login-card {
      background: #161b22;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      border: 1px solid #30363d;
      position: relative;
      z-index: 1;
      transition: border-color 0.3s ease;
    }

    .login-card:hover {
      border-color: rgba(88, 166, 255, 0.3);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #58a6ff, #388bfd);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 1.5rem;
      color: white;
      box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
      transition: all 0.3s ease;
    }

    .login-icon:hover {
      box-shadow: 0 0 30px rgba(88, 166, 255, 0.35);
      transform: translateY(-2px);
    }

    .login-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 4px;
    }

    .login-header p {
      color: #8b949e;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #30363d;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: all 0.3s ease;
      outline: none;
      background: #0d1117;
      color: #e6edf3;
    }

    .form-input::placeholder {
      color: #6e7681;
    }

    .form-input:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #58a6ff, #388bfd);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover {
      background: linear-gradient(135deg, #79c0ff, #58a6ff);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(88, 166, 255, 0.3);
    }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: rgba(248, 81, 73, 0.1);
      color: #f85149;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
      border: 1px solid rgba(248, 81, 73, 0.3);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: #8b949e;
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .back-link:hover { color: #58a6ff; }

    /* Mobile responsive */
    @media (max-width: 480px) {
      body { padding: 16px; }
      .login-card { padding: 32px 24px; border-radius: 12px; }
      .login-icon { width: 52px; height: 52px; font-size: 1.2rem; border-radius: 12px; }
      .login-header h1 { font-size: 1.25rem; }
      .login-header p { font-size: 0.8rem; }
      .form-input { padding: 10px 14px; font-size: 0.9rem; }
      .btn-login { padding: 12px; font-size: 0.9rem; }
    }

    @media (max-width: 360px) {
      .login-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div class="login-icon">
        <i class="fas fa-lock"></i>
      </div>
      <h1>Admin Login</h1>
      <p>Acesse o painel de gerenciamento</p>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-input" placeholder="seu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Senha</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="btn-login">
        <i class="fas fa-sign-in-alt"></i> Entrar
      </button>
    </form>

    <a href="../index.html" class="back-link">
      <i class="fas fa-arrow-left"></i> Voltar ao Portfolio
    </a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script>
    // Check if already logged in
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = './index.html';
    });

    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const btnLogin = document.getElementById('btn-login');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      btnLogin.disabled = true;
      btnLogin.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errorMsg.textContent = 'Email ou senha incorretos.';
        errorMsg.style.display = 'block';
        btnLogin.disabled = false;
        btnLogin.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
        return;
      }

      window.location.href = './index.html';
    });
  </script>
</body>
</html>
